[project]
name = "brokkr-client"
version = "0.6.0"
description = "Ergonomic Python wrapper around the auto-generated brokkr-client-generated low-level client"
authors = []
requires-python = ">=3.10"
readme = "README.md"
license = "Elastic-2.0"
dependencies = [
    # Low-level generated client. Local path dep in-tree; resolved from PyPI
    # for installed releases.
    "brokkr-client-generated",
    "httpx>=0.23.0,<0.29.0",
    "pyyaml>=6",
]

[project.urls]
Homepage = "https://github.com/colliery-io/brokkr"
Repository = "https://github.com/colliery-io/brokkr"
Issues = "https://github.com/colliery-io/brokkr/issues"

[project.optional-dependencies]
test = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
]

[tool.uv.sources]
brokkr-client-generated = { path = "../brokkr-client" }

[tool.uv.build-backend]
module-name = "brokkr"
module-root = ""

[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"

[tool.pytest.ini_options]
asyncio_mode = "auto"

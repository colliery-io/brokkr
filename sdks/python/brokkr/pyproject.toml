[project]
name = "brokkr"
version = "0.0.0"
description = "Ergonomic Python wrapper around the auto-generated brokkr-broker-client"
authors = []
requires-python = ">=3.10"
readme = "README.md"
dependencies = [
    # The generated low-level client. Brought in as a local path dep; CI installs
    # the workspace member, end users install both packages from the same wheel
    # release.
    "brokkr-broker-client",
    "httpx>=0.23.0,<0.29.0",
]

[project.optional-dependencies]
test = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
]

[tool.uv.sources]
brokkr-broker-client = { path = "../brokkr-client" }

[tool.uv.build-backend]
module-name = "brokkr"
module-root = ""

[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"

[tool.pytest.ini_options]
asyncio_mode = "auto"

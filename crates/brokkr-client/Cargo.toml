[package]
name = "brokkr-client"
version = "0.6.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Auto-generated Rust client for the Brokkr broker API"
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/brokkr-client"
readme = "../../README.md"

# This crate's source is generated from openapi/brokkr-v1.json by the
# `progenitor::generate_api!` macro in src/lib.rs. Regeneration happens
# automatically on every `cargo build` whenever the spec changes; CI enforces
# that the spec is in sync with the broker via `angreal openapi check`.

[dependencies]
progenitor = "0.14"
progenitor-client = "0.14"

bytes = "1"
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3"
# TLS via the platform's native stack. Without a TLS feature reqwest can only
# do http:// and every https:// broker URL fails at runtime. `native-tls`
# auto-configures (no crypto-provider install to poison every reqwest client in
# the binary, as rustls-no-provider does) and needs no cmake (unlike aws-lc).
# On Linux it uses OpenSSL (libssl-dev is already in the agent Dockerfile); on
# macOS it uses Security.framework — NOT OpenSSL — so the CLI cross-compile
# (T-0199) stays openssl-free.
reqwest = { version = "0.13", default-features = false, features = ["json", "stream", "native-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
sha2 = "0.10"
uuid = { version = "1", features = ["serde", "v4"] }

tokio = { version = "1", default-features = false, features = ["time"] }

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "test-util", "time"] }

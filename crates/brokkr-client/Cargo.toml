[package]
name = "brokkr-client"
version = "0.6.0"
edition.workspace = true
rust-version.workspace = true
license = "Elastic-2.0"
description = "Auto-generated Rust client for the Brokkr broker API"
repository = "https://github.com/colliery-io/brokkr"
homepage = "https://github.com/colliery-io/brokkr"
documentation = "https://docs.rs/brokkr-client"
readme = "../../README.md"

# This crate's source is generated from openapi/brokkr-v1.json by the
# `progenitor::generate_api!` macro in src/lib.rs. Regeneration happens
# automatically on every `cargo build` whenever the spec changes; CI enforces
# that the spec is in sync with the broker via `angreal openapi check`.

[dependencies]
progenitor = "0.14"
progenitor-client = "0.14"

bytes = "1"
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3"
# TLS via rustls with the **ring** provider (installed in BrokkrClientBuilder::
# build). reqwest 0.13's `rustls` feature would pull aws-lc-rs/aws-lc-sys — a C
# library that needs cmake and is slow/heavy to build (it broke the agent's
# Docker build and the CLI cross-compile). `rustls-no-provider` skips it; ring
# is pure-Rust+asm, already in the workspace via kube, and openssl-free.
reqwest = { version = "0.13", default-features = false, features = ["json", "stream", "rustls-no-provider"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12", "logging"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
sha2 = "0.10"
uuid = { version = "1", features = ["serde", "v4"] }

tokio = { version = "1", default-features = false, features = ["time"] }

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "test-util", "time"] }

---
name: Nightly Test Suite
on:
  schedule:
    # Run at 4 AM UTC every day
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-tests
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  setup:
    uses: ./.github/workflows/setup.yml
  unit_tests:
    needs: setup
    uses: ./.github/workflows/unit_tests.yml
  integration_tests:
    needs: setup
    uses: ./.github/workflows/integration_tests.yml
  e2e_tests:
    needs: integration_tests
    uses: ./.github/workflows/e2e_tests.yml

  # ---------------------------------------------------------------------
  # Nightly container images — push :nightly tag for broker and agent so
  # downstream users tracking the bleeding edge of main get a fresh build
  # every morning without waiting for a tagged release.
  # ---------------------------------------------------------------------
  nightly-images:
    name: Nightly container images
    needs: [unit_tests, integration_tests, e2e_tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [broker, agent]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Compute image name
        id: img
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          owner_lc=$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "image=${{ env.REGISTRY }}/${owner_lc}/brokkr-${{ matrix.component }}" >> "$GITHUB_OUTPUT"

      - name: Build and push :nightly
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.${{ matrix.component }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.img.outputs.image }}:nightly
          provenance: false
          cache-from: type=gha,scope=nightly-${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=nightly-${{ matrix.component }}
          build-args: |
            VERSION=nightly-${{ github.sha }}

  # ---------------------------------------------------------------------
  # Failure notification — auto-create / re-comment a GitHub issue so a
  # broken nightly doesn't sit unnoticed until the next release attempt.
  # ---------------------------------------------------------------------
  notify-failure:
    name: Notify on Failure
    needs: [unit_tests, integration_tests, e2e_tests, nightly-images]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check for existing nightly-failure issue
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'nightly-failure',
              state: 'open',
            });
            core.setOutput('exists', issues.data.length > 0 ? 'true' : 'false');
            if (issues.data.length > 0) {
              core.setOutput('issue_number', issues.data[0].number);
            }

      - name: Create GitHub Issue on failure
        if: steps.check.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Nightly failure — ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## Nightly Test Failure',
              '',
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Date:** ${new Date().toISOString()}`,
              '',
              'One or more nightly jobs failed on `main`. Check the run logs for details.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['nightly-failure'],
            });

      - name: Comment on existing issue
        if: steps.check.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.check.outputs.issue_number }},
              body: `Still failing — [run ${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            });

  # ---------------------------------------------------------------------
  # Prune stale caches & artifacts — keep storage from creeping up to
  # the point where GitHub starts sending quota warnings.
  #
  # Strategy:
  #   - On main: for each (key-prefix) group, keep only the newest cache
  #     entry. Older entries are superseded by the run that just finished
  #     and cost storage with no upside.
  #   - On closed/deleted PR refs: drop every cache scoped to that ref.
  #     GitHub eventually evicts these after 7 days idle; we accelerate
  #     it so we don't sit near quota in the meantime.
  #   - Never touches refs/tags/* — release.yml owns those.
  #
  # Runs with `if: always()` so cleanup happens even when tests are red.
  # ---------------------------------------------------------------------
  prune-caches:
    name: Prune Stale Caches
    needs: [unit_tests, integration_tests, e2e_tests, nightly-images]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete superseded caches on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api --paginate "repos/${REPO}/actions/caches?per_page=100&ref=refs/heads/main" \
            --jq '.actions_caches[] | [.id, .created_at, .key] | @tsv' \
              > caches.tsv || { echo "no caches"; exit 0; }
          if [ ! -s caches.tsv ]; then
            echo "no caches on main"
            exit 0
          fi
          # Group by key prefix (strip trailing -<hash> component), keep
          # newest id per prefix, mark the rest for deletion.
          awk -F'\t' '{ n=split($3, a, "-"); prefix=""; for (i=1;i<n;i++) prefix = prefix (i>1 ? "-" : "") a[i]; print $1"\t"$2"\t"prefix }' caches.tsv \
            | sort -t$'\t' -k3,3 -k2,2r \
            | awk -F'\t' '!seen[$3]++ { next } { print $1 }' > to_delete.txt
          if [ ! -s to_delete.txt ]; then
            echo "nothing superseded on main"
            exit 0
          fi
          echo "Deleting $(wc -l < to_delete.txt) superseded caches on main"
          while read id; do
            gh api -X DELETE "repos/${REPO}/actions/caches/${id}" || true
          done < to_delete.txt

      - name: Delete caches for closed PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Collect open PR refs so we know which to preserve.
          gh api --paginate "repos/${REPO}/pulls?state=open&per_page=100" \
            --jq '.[].number' > open_prs.txt || true

          # List every cache scoped to a refs/pull/N/merge ref.
          gh api --paginate "repos/${REPO}/actions/caches?per_page=100" \
            --jq '.actions_caches[] | select(.ref | startswith("refs/pull/")) | [.id, .ref] | @tsv' \
              > pr_caches.tsv || true

          if [ ! -s pr_caches.tsv ]; then
            echo "no PR-scoped caches"
            exit 0
          fi

          deleted=0
          while IFS=$'\t' read -r id ref; do
            # ref looks like refs/pull/123/merge — extract the number.
            pr_num=$(echo "$ref" | awk -F'/' '{print $3}')
            if grep -qx "$pr_num" open_prs.txt 2>/dev/null; then
              continue
            fi
            gh api -X DELETE "repos/${REPO}/actions/caches/${id}" || true
            deleted=$((deleted + 1))
          done < pr_caches.tsv
          echo "Deleted ${deleted} caches from closed PRs"

      - name: Report cache storage usage
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          total_bytes=$(gh api "repos/${REPO}/actions/cache/usage" --jq '.active_caches_size_in_bytes' 2>/dev/null || echo "0")
          total_gb=$(awk -v b="$total_bytes" 'BEGIN { printf "%.2f", b / 1024 / 1024 / 1024 }')
          echo "## Cache storage after prune: ${total_gb} GB" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------
  # Prune stale GHCR container versions for brokkr-broker / brokkr-agent.
  #
  # Each multi-arch push leaves per-platform digests in the package
  # registry. When a tag (e.g. :nightly, or a release manifest) gets
  # repointed, the old manifest and its platform digests become
  # untagged but still occupy storage. Over a few weeks of nightlies
  # this is the dominant source of package-storage quota pressure.
  #
  # Strategy: delete only untagged versions, keep the most recent N
  # untagged versions so we never accidentally prune platform digests
  # that an active multi-arch manifest still references.
  # ---------------------------------------------------------------------
  prune-ghcr-images:
    name: Prune Stale GHCR Images
    needs: [nightly-images]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        package: [brokkr-broker, brokkr-agent]
    steps:
      - name: Delete untagged versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.package }}
          package-type: container
          owner: ${{ github.repository_owner }}
          min-versions-to-keep: 20
          delete-only-untagged-versions: true

  # ---------------------------------------------------------------------
  # Close resolved — auto-close any open nightly-failure issue once a
  # nightly run succeeds end-to-end.
  # ---------------------------------------------------------------------
  close-resolved:
    name: Close Resolved Issues
    needs: [unit_tests, integration_tests, e2e_tests, nightly-images]
    if: success()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'nightly-failure',
              state: 'open',
            });

            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Resolved — nightly passed in [run ${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'crates/*/src/**'
      - 'plissken.toml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  MDBOOK_VERSION: "0.5.2"
  MDBOOK_MERMAID_VERSION: "0.17.0"
  PLISSKEN_VERSION: "0.0.2"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar -xz
          mv mdbook /usr/local/bin/

      - name: Install mdbook-mermaid
        run: |
          curl -sSL "https://github.com/badboy/mdbook-mermaid/releases/download/v${MDBOOK_MERMAID_VERSION}/mdbook-mermaid-v${MDBOOK_MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar -xz
          mv mdbook-mermaid /usr/local/bin/

      - name: Install plissken
        run: cargo install plissken@${PLISSKEN_VERSION}

      - name: Generate Rust API reference
        run: |
          plissken render
          rm -rf docs/src/api/rust
          cp -r .plissken/output/src/rust docs/src/api/rust

      - name: Update SUMMARY.md with API entries
        run: |
          python3 -c "
          import re
          with open('.plissken/output/src/SUMMARY.md') as f:
              lines = f.readlines()
          entries = []
          for line in lines:
              if line.strip().startswith('- ['):
                  entry = re.sub(r'\]\(rust/', '](./api/rust/', line)
                  entries.append('  ' + entry)
          with open('docs/src/SUMMARY.md') as f:
              summary = f.read()
          idx = summary.find('# API Documentation')
          api = '# API Documentation\n\n- [Rust API Reference](./api/README.md)\n' + ''.join(entries)
          with open('docs/src/SUMMARY.md', 'w') as f:
              f.write(summary[:idx] + api)
          print(f'Updated SUMMARY.md with {len(entries)} API entries')
          "

      - name: Build
        working-directory: docs
        run: mdbook build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

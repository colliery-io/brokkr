---
name: Fast Code Validation
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    uses: ./.github/workflows/setup.yml
  unit_tests:
    needs: setup
    uses: ./.github/workflows/unit_tests.yml

  # Path-filter: only run the slower integration / SDK-contract suites when
  # source actually changed. Doc-only / workflow-only PRs skip them. Without
  # these gates, every PR pays ~10 min for integration + another ~5 min for
  # the SDK contract matrix. Without the suites, broken tests sit on main
  # until nightly or release-tag time.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      sdk_contract: ${{ steps.filter.outputs.sdk_contract }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'openapi/**'
              - '.angreal/**'
              - '.github/workflows/main.yml'
              - '.github/workflows/integration_tests.yml'
            sdk_contract:
              - 'crates/brokkr-broker/**'
              - 'crates/brokkr-client/**'
              - 'sdks/python/brokkr-client/**'
              - 'sdks/typescript/brokkr-client/**'
              - 'openapi/**'
              - 'tests/sdk-contract/**'
              - '.angreal/task_tests.py'
              - '.github/workflows/main.yml'
              - '.github/workflows/sdk_contract_tests.yml'

  integration_tests:
    needs: [setup, changes]
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/integration_tests.yml
    secrets: inherit

  sdk_contract_tests:
    needs: [setup, changes]
    if: needs.changes.outputs.sdk_contract == 'true'
    uses: ./.github/workflows/sdk_contract_tests.yml
    secrets: inherit

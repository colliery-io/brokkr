---
name: SDK Contract Tests
on:
  workflow_call:
env:
  CARGO_TERM_COLOR: always
jobs:
  sdk_contract_tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [rust, python, typescript]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install angreal and uv
        run: |
          python -m pip install --upgrade pip
          pip install angreal uv

      - name: Set up Rust
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@1.90

      - name: Set up Node
        if: matrix.language == 'typescript'
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Cache Rust build
        if: matrix.language == 'rust'
        uses: actions/cache@v5
        with:
          path: |
            target
            tests/sdk-contract/rust/target
          key: ${{ runner.os }}-sdkcontract-rust-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-sdkcontract-rust-

      - name: Create required directories
        run: |
          mkdir -p /tmp/brokkr-keys
          chmod 777 /tmp/brokkr-keys

      - name: docker compose up
        uses: hoverkraft-tech/compose-action@v3.0.0
        with:
          compose-file: ".angreal/files/docker-compose.yaml"

      - name: Execute SDK contract tests
        run: angreal tests sdk-contract --skip-docker ${{ matrix.language }}

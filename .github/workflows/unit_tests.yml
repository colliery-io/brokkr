---
name: Unit Tests
on:
  workflow_call:
jobs:
  unit_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install angreal
        run: |
          python -m pip install --upgrade pip
          pip install angreal
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.90
      - name: Cache build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-rust-build-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-rust-build-
      # Single job over all lib crates (the list lives in
      # .angreal/task_tests.py CRATES["unit_tests"] — the single source of
      # truth). One workspace compile instead of the old matrix's N parallel
      # re-compiles.
      - name: Run unit tests
        run: angreal tests unit all
      # brokkr-cli is a bin-only crate, so it has no lib target for the
      # `--lib` model above. Run its unit + black-box binary tests directly
      # (tests/cli.rs needs no broker).
      - name: Run brokkr-cli tests
        run: cargo test -p brokkr-cli -- --test-threads=1

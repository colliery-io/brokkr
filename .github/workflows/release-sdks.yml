---
name: Release SDKs

# Tag-driven SDK publishing. Runs in parallel with the broker / helm release
# workflow (release.yml); the two share the same v* tag but have independent
# approval gates.
#
# Versioning is lockstep: the git tag drives the version stamped into all
# four packages (Rust crate, two Python distributions, one npm package).
# Source manifests stay at 0.0.0; stamping happens in this workflow only.
#
# Publish steps land in R2-D (BROKKR-T-0148). This skeleton builds and
# uploads artifacts, and pauses at the publish-sdks environment gate.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Version to stamp (e.g. 0.3.0). For dry-run testing only;
          a tag push is the real release trigger. Default is an
          obviously-fake high version that's valid under both semver
          and PEP 440.
        required: true
        default: '99.99.99'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve-version:
    name: Resolve and validate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      is_tag: ${{ steps.v.outputs.is_tag }}
    steps:
      - name: Determine version
        id: v
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            IS_TAG=false
          else
            # github.ref_name on tag push is e.g. "v0.3.0"; strip the leading v.
            VERSION="${GITHUB_REF_NAME#v}"
            IS_TAG=true
          fi
          # Stable releases only for v1 of this pipeline. Pre-release tags
          # (rc/alpha/beta) are not in scope yet (see BROKKR-I-0018 non-goals).
          if [[ "$IS_TAG" == "true" && ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not match v<major>.<minor>.<patch>. Pre-releases are not supported yet."
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_tag=${IS_TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION} (tag=${IS_TAG})"

  drift-check:
    name: Fail-fast spec drift check
    runs-on: ubuntu-latest
    needs: resolve-version
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install angreal
        run: pipx install angreal

      - name: openapi check (spec + crate mirror parity)
        run: angreal openapi check

      - name: openapi check-python
        run: angreal openapi check-python

      - name: openapi check-typescript
        run: angreal openapi check-typescript

  build:
    name: Stamp version and build artifacts
    runs-on: ubuntu-latest
    needs: [resolve-version, drift-check]
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # --- Stamp the resolved version into every manifest. Manifests stay
      # 0.0.0 in source; stamping is workflow-local only. We use a regex on
      # each manifest rather than `cargo set-version` (which enforces semver
      # ordering and rejects pre-release-suffixed dispatch versions). ---

      - name: Stamp Rust crate version
        working-directory: crates/brokkr-client
        run: |
          python3 -c "
          import re, pathlib
          p = pathlib.Path('Cargo.toml')
          s = p.read_text()
          s = re.sub(r'^version = \".*\"', f'version = \"${VERSION}\"', s, count=1, flags=re.M)
          p.write_text(s)
          "
          grep '^version' Cargo.toml

      - name: Stamp Python wrapper version
        working-directory: sdks/python/brokkr
        run: |
          python -c "
          import re, pathlib
          p = pathlib.Path('pyproject.toml')
          s = p.read_text()
          s = re.sub(r'^version = \".*\"', f'version = \"${VERSION}\"', s, count=1, flags=re.M)
          p.write_text(s)
          "
          grep '^version' pyproject.toml

      - name: Stamp Python generated version
        working-directory: sdks/python/brokkr-client
        run: |
          python -c "
          import re, pathlib
          p = pathlib.Path('pyproject.toml')
          s = p.read_text()
          s = re.sub(r'^version = \".*\"', f'version = \"${VERSION}\"', s, count=1, flags=re.M)
          p.write_text(s)
          "
          grep '^version' pyproject.toml

      - name: Stamp TypeScript package version
        working-directory: sdks/typescript/brokkr-client
        run: npm version "${VERSION}" --no-git-tag-version --allow-same-version

      # --- Build artifacts. Each step is independent so a failure in one
      # surfaces clearly. The publish job picks artifacts up by name. ---

      - name: Build Rust crate (cargo package)
        run: cargo package -p brokkr-client --allow-dirty

      - name: Build Python wrapper (uv build)
        working-directory: sdks/python/brokkr
        run: uv build

      - name: Build Python generated (uv build)
        working-directory: sdks/python/brokkr-client
        run: uv build

      - name: Build TypeScript package (npm pack)
        working-directory: sdks/typescript/brokkr-client
        run: |
          npm install
          npm pack

      # --- Upload artifacts for downstream publish jobs. ---

      - name: Upload Rust artifact
        uses: actions/upload-artifact@v7
        with:
          name: rust-crate
          path: target/package/brokkr-client-*.crate
          if-no-files-found: error
          retention-days: 7

      - name: Upload Python wrapper artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-wrapper
          path: sdks/python/brokkr/dist/*
          if-no-files-found: error
          retention-days: 7

      - name: Upload Python generated artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-generated
          path: sdks/python/brokkr-client/dist/*
          if-no-files-found: error
          retention-days: 7

      - name: Upload TypeScript artifact
        uses: actions/upload-artifact@v7
        with:
          name: typescript-package
          path: sdks/typescript/brokkr-client/colliery-io-brokkr-client-*.tgz
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish (gated)
    runs-on: ubuntu-latest
    needs: [resolve-version, build]
    # Manual approval gate. PyPI Trusted Publishing matches on this
    # environment name (publish-sdks) + workflow filename (release-sdks.yml).
    # Renaming either requires updating the PyPI pending publisher records.
    environment: publish-sdks
    permissions:
      id-token: write   # Required for PyPI Trusted Publishing (OIDC).
      contents: read
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
      IS_TAG: ${{ needs.resolve-version.outputs.is_tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Note dry-run / non-tag invocation
        if: needs.resolve-version.outputs.is_tag != 'true'
        run: |
          echo "::notice::workflow_dispatch run — every publish step below will run with --dry-run only. No artifacts will be uploaded to public registries."

      # ----- Download artifacts produced by the build job. -----

      - name: Download Rust artifact
        uses: actions/download-artifact@v8
        with:
          name: rust-crate
          path: dist/rust

      - name: Download Python wrapper artifact
        uses: actions/download-artifact@v8
        with:
          name: python-wrapper
          path: dist/python-wrapper

      - name: Download Python generated artifact
        uses: actions/download-artifact@v8
        with:
          name: python-generated
          path: dist/python-generated

      - name: Download TypeScript artifact
        uses: actions/download-artifact@v8
        with:
          name: typescript-package
          path: dist/typescript

      # ----- Cargo: publish brokkr-client to crates.io. -----
      #
      # We can't publish from the artifact directly — `cargo publish` rebuilds
      # from the source tree. Re-stamp the version, then publish. Dry-run runs
      # in both real and dispatch invocations; the real publish only fires on
      # a tag push.

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Stamp Rust crate version for publish
        working-directory: crates/brokkr-client
        run: |
          python3 -c "
          import re, pathlib
          p = pathlib.Path('Cargo.toml')
          s = p.read_text()
          s = re.sub(r'^version = \".*\"', f'version = \"${VERSION}\"', s, count=1, flags=re.M)
          p.write_text(s)
          "
          grep '^version' Cargo.toml

      # All publish steps below set `continue-on-error: true` so a failure in
      # one registry doesn't cascade-skip the others. The final
      # `Summarize publish results` step fails the job if any publish step
      # failed, so partial failures stay visible.
      #
      # `skip-existing: true` on PyPI uploads makes retries idempotent if a
      # version is already up (e.g. cutting v0.3.1 after a partial v0.3.0).

      - name: Cargo publish dry-run
        id: cargo-dryrun
        continue-on-error: true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p brokkr-client --dry-run --allow-dirty

      - name: Cargo publish
        id: cargo-publish
        if: needs.resolve-version.outputs.is_tag == 'true' && steps.cargo-dryrun.outcome == 'success'
        continue-on-error: true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p brokkr-client --allow-dirty

      # ----- PyPI: publish both Python distributions via Trusted Publishing.
      #
      # Each call uses its own pending-publisher record on PyPI. No long-lived
      # token; OIDC authenticates the job. The two packages publish independently
      # so a failure in one doesn't poison the other's deployment record.

      - name: PyPI publish — brokkr-client (wrapper)
        id: pypi-wrapper
        if: needs.resolve-version.outputs.is_tag == 'true'
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/python-wrapper
          skip-existing: true
          verbose: true

      - name: PyPI publish — brokkr-client-generated (low-level)
        id: pypi-generated
        if: needs.resolve-version.outputs.is_tag == 'true'
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/python-generated
          skip-existing: true
          verbose: true

      # ----- npm: publish @colliery-io/brokkr-client. -----
      #
      # Scoped public packages require `--access public` on first publish
      # (npm's default for scoped packages is private, which requires a paid
      # account). Dry-run validates that the version doesn't already exist
      # before committing.

      # npm Trusted Publishing (OIDC). Configured on npmjs.com for
      # @colliery-io/brokkr-client against this repo + workflow file. No
      # NPM_TOKEN secret — the npm CLI mints a short-lived OIDC token from
      # the job's id-token at publish time. Requires npm CLI 11.5.1+, which
      # is why we install npm@latest after setup-node (node 24 ships npm 11,
      # but we pin to latest defensively for the version-bump cadence).
      - name: Set up Node.js (OIDC trusted publisher)
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm >= 11.5.1 (required for trusted publishing)
        run: |
          set -euo pipefail
          npm install -g npm@latest
          npm --version

      - name: npm publish dry-run
        id: npm-dryrun
        continue-on-error: true
        working-directory: dist/typescript
        run: |
          set -euo pipefail
          TARBALL=$(ls colliery-io-brokkr-client-*.tgz)
          echo "Validating ${TARBALL}"
          npm publish "${TARBALL}" --access public --provenance --dry-run

      - name: npm publish
        id: npm-publish
        if: needs.resolve-version.outputs.is_tag == 'true' && steps.npm-dryrun.outcome == 'success'
        continue-on-error: true
        working-directory: dist/typescript
        run: |
          set -euo pipefail
          TARBALL=$(ls colliery-io-brokkr-client-*.tgz)
          npm publish "${TARBALL}" --access public --provenance

      - name: Summarize publish results
        if: always()
        env:
          CARGO_DRYRUN: ${{ steps.cargo-dryrun.outcome }}
          CARGO_PUBLISH: ${{ steps.cargo-publish.outcome }}
          PYPI_WRAPPER: ${{ steps.pypi-wrapper.outcome }}
          PYPI_GENERATED: ${{ steps.pypi-generated.outcome }}
          NPM_DRYRUN: ${{ steps.npm-dryrun.outcome }}
          NPM_PUBLISH: ${{ steps.npm-publish.outcome }}
          IS_TAG: ${{ needs.resolve-version.outputs.is_tag }}
        run: |
          set -eo pipefail
          echo "## SDK publish summary" >> "$GITHUB_STEP_SUMMARY"
          {
            echo "| Step | Outcome |"
            echo "|------|---------|"
            echo "| Cargo dry-run | ${CARGO_DRYRUN:-(unset)} |"
            echo "| Cargo publish | ${CARGO_PUBLISH:-(unset)} |"
            echo "| PyPI brokkr-client | ${PYPI_WRAPPER:-(unset)} |"
            echo "| PyPI brokkr-client-generated | ${PYPI_GENERATED:-(unset)} |"
            echo "| npm dry-run | ${NPM_DRYRUN:-(unset)} |"
            echo "| npm publish | ${NPM_PUBLISH:-(unset)} |"
          } >> "$GITHUB_STEP_SUMMARY"
          fail=0
          for outcome in "$CARGO_DRYRUN" "$CARGO_PUBLISH" "$PYPI_WRAPPER" "$PYPI_GENERATED" "$NPM_DRYRUN" "$NPM_PUBLISH"; do
            if [[ "$outcome" == "failure" ]]; then fail=1; fi
          done
          if [[ "$fail" == "1" ]]; then
            echo "::error::One or more publish steps failed. See the step outcomes above."
            exit 1
          fi
          echo "All publish steps either succeeded or were intentionally skipped."

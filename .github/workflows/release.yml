---
name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  REGISTRY_USER: ${{ github.actor }}
  CARGO_TERM_COLOR: always

jobs:
  # Fail fast if the tag doesn't match the version baked into every package.
  # Tag v0.7.0 without the lockstep bump commit would otherwise ship tarballs
  # named 0.7.0 containing a binary that reports 0.6.0 (and mislabeled images
  # and charts). Runs before the tests so a mistag costs seconds, not the full
  # suite.
  verify-version:
    name: Verify tag matches package versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Assert tag == crate/SDK versions
        run: |
          set -uo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          BASE="$(printf '%s' "$TAG" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')"
          if [ -z "$BASE" ]; then
            echo "::error::tag '$GITHUB_REF_NAME' is not a vMAJOR.MINOR.PATCH[...] tag"; exit 1
          fi
          echo "Tag version: $TAG (base $BASE)"
          base_of() { printf '%s' "$1" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+'; }
          fail=0

          # Workspace crates are semver, same format as the git tag, and the
          # CLI binary reports its crate version — require an exact match.
          while IFS=$'\t' read -r name version; do
            if [ "$version" != "$TAG" ]; then
              echo "::error::crate $name = $version, expected $TAG"; fail=1
            fi
          done < <(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | [.name, .version] | @tsv')

          # SDK manifests use PEP 440 / npm prerelease spellings that differ
          # from semver (0.7.0rc1 vs 0.7.0-rc.1), so compare the numeric base —
          # enough to catch a forgotten lockstep bump.
          check_base() {  # $1 = label, $2 = version string
            local got; got="$(base_of "$2")"
            if [ "$got" != "$BASE" ]; then
              echo "::error::$1 = $2 (base $got), expected base $BASE"; fail=1
            fi
          }
          check_base "python brokkr (pyproject.toml)" \
            "$(grep -m1 '^version' sdks/python/brokkr/pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          check_base "python brokkr-client-generated (pyproject.toml)" \
            "$(grep -m1 '^version' sdks/python/brokkr-client/pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          check_base "typescript brokkr-client (package.json)" \
            "$(jq -r .version sdks/typescript/brokkr-client/package.json)"

          if [ "$fail" -ne 0 ]; then
            echo "::error::version mismatch — bump every package to match the tag before releasing"
            exit 1
          fi
          echo "All package versions agree with tag $TAG"

  # Run the full test suite before building release artifacts
  setup:
    needs: verify-version
    uses: ./.github/workflows/setup.yml
  unit_tests:
    needs: setup
    uses: ./.github/workflows/unit_tests.yml
  integration_tests:
    needs: setup
    uses: ./.github/workflows/integration_tests.yml
  e2e_tests:
    needs: integration_tests
    uses: ./.github/workflows/e2e_tests.yml

  build-release-images:
    needs: [unit_tests, e2e_tests]
    name: Build Release Images
    strategy:
      fail-fast: false
      matrix:
        component: [broker, agent]
        platform: [linux/amd64, linux/arm64]
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        if: matrix.platform != 'linux/arm64'
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/brokkr-${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Get platform identifier
        id: platform
        run: |
          PLATFORM_PAIR=${{ matrix.platform }}
          PLATFORM_ARCH=${PLATFORM_PAIR#*/}
          echo "arch=${PLATFORM_ARCH}" >> $GITHUB_OUTPUT

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ./docker/Dockerfile.${{ matrix.component }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=build-${{ matrix.component }}-${{ steps.platform.outputs.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.component }}-${{ steps.platform.outputs.arch }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository_owner }}/brokkr-${{ matrix.component }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            VERSION=${{ github.ref_name }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests/${{ matrix.component }}
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${{ matrix.component }}/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.component }}-${{ steps.platform.outputs.arch }}
          path: /tmp/digests/${{ matrix.component }}/*
          if-no-files-found: error
          retention-days: 1

  publish-container-images:
    name: Publish Container Images
    needs: build-release-images
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://github.com/${{ github.repository }}/pkgs/container/brokkr-broker
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [broker, agent]
    steps:
      - name: Download amd64 digests
        uses: actions/download-artifact@v8
        with:
          name: digests-${{ matrix.component }}-amd64
          path: /tmp/digests/${{ matrix.component }}

      - name: Download arm64 digests
        uses: actions/download-artifact@v8
        with:
          name: digests-${{ matrix.component }}-arm64
          path: /tmp/digests/${{ matrix.component }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/brokkr-${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create manifest list and push
        working-directory: /tmp/digests/${{ matrix.component }}
        run: |
          # Retry: imagetools talks to the registry and intermittently hits
          # transient network errors / read-after-write races.
          for attempt in 1 2 3; do
            docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
              $(printf '${{ env.REGISTRY }}/${{ github.repository_owner }}/brokkr-${{ matrix.component }}@sha256:%s ' *) && break
            echo "imagetools create failed (attempt $attempt); retrying in 15s"; sleep 15
          done

      - name: Inspect image
        run: |
          for attempt in 1 2 3; do
            docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ github.repository_owner }}/brokkr-${{ matrix.component }}:${{ steps.meta.outputs.version }} && break
            echo "imagetools inspect failed (attempt $attempt); retrying in 15s"; sleep 15
          done

  build-cli-binaries:
    needs: [unit_tests, e2e_tests]
    name: Build CLI Binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          # Both macOS targets build on the Apple-Silicon runner: aarch64
          # natively, x86_64 cross-compiled (the toolchain step installs the
          # target; brokkr-cli's dep tree has no openssl-sys/native-tls, so the
          # cross-link is clean). Avoids depending on a free Intel runner —
          # GitHub has retired the macos-13 image.
          - target: x86_64-apple-darwin
            runner: macos-14
          - target: aarch64-apple-darwin
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.90
        with:
          targets: ${{ matrix.target }}

      - name: Build brokkr CLI
        run: cargo build --release --locked -p brokkr-cli --target ${{ matrix.target }}

      - name: Package tarball
        id: package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          NAME="brokkr-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${NAME}"
          cp "target/${{ matrix.target }}/release/brokkr" "dist/${NAME}/"
          cp README.md LICENSE.txt "dist/${NAME}/"
          tar -czf "dist/${NAME}.tar.gz" -C dist "${NAME}"
          echo "artifact=dist/${NAME}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: brokkr-cli-${{ matrix.target }}
          path: ${{ steps.package.outputs.artifact }}
          if-no-files-found: error
          retention-days: 1

  publish-helm-charts:
    name: Publish Helm Charts
    needs: publish-container-images
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: 'v3.12.0'

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add openfunction https://openfunction.github.io/charts/

      - name: Build Helm dependencies
        run: |
          helm dependency build charts/brokkr-broker
          helm dependency build charts/brokkr-agent

      - name: Log in to GHCR
        run: echo ${{ secrets.GHCR_TOKEN }} | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push Helm charts to OCI registry
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          # Package broker chart
          helm package charts/brokkr-broker --version ${VERSION} --app-version ${VERSION}
          helm push brokkr-broker-${VERSION}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

          # Package agent chart
          helm package charts/brokkr-agent --version ${VERSION} --app-version ${VERSION}
          helm push brokkr-agent-${VERSION}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Create GitHub Release with chart artifacts
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: '*.tgz'
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}

  publish-cli-binaries:
    name: Publish CLI Binaries
    needs: [build-cli-binaries, publish-helm-charts]
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
    permissions:
      contents: write
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: brokkr-cli-*
          path: /tmp/cli
          merge-multiple: true

      - name: Attach CLI binaries to the release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: /tmp/cli/*.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
